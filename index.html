<!DOCTYPE html><html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TRS Calculator</title><style>
body{font-family:Arial;background:#0f172a;color:white;padding:15px;}
input,button{width:100%;padding:10px;margin:5px 0;border-radius:8px;border:none;}
button{background:#22c55e;color:white;font-weight:bold;}
</style></head>
<body><h2>TRS Test</h2><input type="number" id="TT" placeholder="TT">
<input type="number" id="TO" placeholder="TO">
<input type="number" id="AP" placeholder="AP">
<input type="number" id="ANP" placeholder="ANP">
<input type="number" id="P" placeholder="Production">
<input type="number" id="NQ" placeholder="NQ">
<input type="number" id="cadence" placeholder="Cadence"><button onclick="calc()">Calculate</button>

<h3 id="result">Result: 0</h3><script>

function calc(){

let TT = Number(document.getElementById("TT").value);
let TO = Number(document.getElementById("TO").value);
let AP = Number(document.getElementById("AP").value);
let ANP = Number(document.getElementById("ANP").value);
let P = Number(document.getElementById("P").value);
let NQ = Number(document.getElementById("NQ").value);
let cadence = Number(document.getElementById("cadence").value);

if(!TT || !TO || !cadence){
document.getElementById("result").innerText = "Fill data";
return;
}

let TR = TO - AP;
let TF = TR - ANP;

let quality = P > 0 ? (P - NQ) / P : 0;
let prodTheo = TF * cadence;

let availability = TR > 0 ? TF / TR : 0;
let performance = prodTheo > 0 ? P / prodTheo : 0;

let trs = availability * performance * quality * 100;

document.getElementById("result").innerText = "TRS = " + trs.toFixed(2) + "%";

}

</script></body>
</html>
