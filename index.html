<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TRS / TRG Monitoring PRO</title>

<style>
body{font-family:Arial;background:#0f172a;color:white;padding:15px;}
.card{background:#1e293b;padding:15px;border-radius:12px;margin-top:10px;}
input,select,button{width:100%;padding:10px;margin:5px 0;border-radius:8px;border:none;}
button{background:#22c55e;color:white;font-weight:bold;}
.delete{background:#ef4444;}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.footer{text-align:center;margin-top:20px;color:#94a3b8;}
</style>
</head>

<body>

<h2>🏭 TRS / TRG Monitoring PRO</h2>
<p style="color:#94a3b8;">Developed by <b>SAAD DAMOU</b></p>

<div class="card">
<label>La date</label>
<input type="date" id="date">

<select id="shift">
<option>Shift 1</option>
<option>Shift 2</option>
<option>Shift 3</option>
</select>

<select id="ligne">
<option>Ligne 11</option><option>Ligne 4</option><option>Ligne 6</option>
<option>Ligne 13</option><option>Ligne 12</option><option>Ligne 7</option>
<option>Ligne 10</option><option>Ligne 8</option><option>Ligne 9</option>
<option>Ligne 14</option><option>LV3</option><option>VPF</option><option>VGF</option>
</select>
</div>

<div class="card grid">
<input type="number" id="TT" placeholder="Total Time (h)">
<input type="number" id="TO" placeholder="Opening Time (h)">
<input type="number" id="AP" placeholder="Planned Stop (h)">
<input type="number" id="ANP" placeholder="Unplanned Stop (h)">
</div>

<div class="card grid">
<input type="number" id="P" placeholder="Production">
<input type="number" id="NQ" placeholder="Non Quality">
<input type="number" id="cadence" placeholder="Cadence (bph)">
</div>

<button onclick="calc()">Calculate</button>
<button onclick="saveData()">Save</button>
<button onclick="exportCSV()">Export Excel</button>

<div class="card">

<p>La date: <span id="dateRes">-</span></p>

<p>TR: <span id="tr">0</span></p>
<p>TF: <span id="tf">0</span></p>
<p>TN: <span id="tn">0</span></p>
<p>TU: <span id="tu">0</span></p>

<p>TRS: <span id="trs">0</span>%</p>
<p>TRG: <span id="trg">0</span>%</p>
<p>TC: <span id="tc">0</span>%</p>
<p>Loss: <span id="loss">0</span>%</p>

<p id="alert"></p>

</div>

<div class="card">
<h3>Filters</h3>
<input type="date" id="fDate">
<select id="fLigne"><option value="">All lignes</option></select>
<select id="fShift"><option value="">All shifts</option></select>
<button onclick="applyFilter()">Apply Filter</button>
</div>

<div class="card">
<h3>History</h3>
<ul id="history"></ul>
</div>

<div class="card">
<h3>Ranking</h3>
<ul id="ranking"></ul>
</div>

<div class="footer">
© 2026 Developed by SAAD DAMOU
</div>

<script>

let historyData = [];
let currentData = null;

function calc(){

let TT = Number(document.getElementById("TT").value);
let TO = Number(document.getElementById("TO").value);
let AP = Number(document.getElementById("AP").value);
let ANP = Number(document.getElementById("ANP").value);
let P = Number(document.getElementById("P").value);
let NQ = Number(document.getElementById("NQ").value);
let cadence = Number(document.getElementById("cadence").value);
let date = document.getElementById("date").value;

if(!TT || !TO || !P || !cadence || !date){
alert("Fill all fields");
return;
}

let TR = TO - AP;
let TF = TR - ANP;
if(TF <= 0) TF = 0.001;

let TN = P / cadence;
let quality = (P - NQ) / P;
let TU = TN * quality;

let production_theorique = TF * cadence;

let availability = (TF / TR) * 100;
let performance = (P / production_theorique) * 100;
let qual = quality * 100;

let trs = (availability * performance * qual) / 10000;
let tc = (TO / TT) * 100;
let trg = trs * tc / 100;

trs = Math.min(trs,100);
trg = Math.min(trg,100);

set("tr",TR);
set("tf",TF);
set("tn",TN);
set("tu",TU);

set("trs",trs);
set("trg",trg);
set("tc",tc);
set("loss",100-trs);

document.getElementById("alert").innerText =
trs < 85 ? "Low TRS" : "Good Performance";

document.getElementById("dateRes").innerText = date;

currentData = {
date: date,
ligne: document.getElementById("ligne").value,
shift: document.getElementById("shift").value,
trs: trs,
trg: trg
};

}

function saveData(){
if(!currentData){alert("Calculate first"); return;}
historyData.push(currentData);
render();
}

function render(){

let ul = document.getElementById("history");
ul.innerHTML = "";

historyData.forEach((d,i)=>{
ul.innerHTML += `<li>
${d.date} | ${d.ligne} | ${d.shift} | TRS ${d.trs.toFixed(2)}% | TRG ${d.trg.toFixed(2)}%
<button class="delete" onclick="del(${i})">X</button>
</li>`;
});

updateFilters();
ranking();
}

function del(i){
historyData.splice(i,1);
render();
}

function updateFilters(){

let lignes = [...new Set(historyData.map(d=>d.ligne))];
let shifts = [...new Set(historyData.map(d=>d.shift))];

document.getElementById("fLigne").innerHTML =
'<option value="">All lignes</option>' + lignes.map(l=>`<option>${l}</option>`).join("");

document.getElementById("fShift").innerHTML =
'<option value="">All shifts</option>' + shifts.map(s=>`<option>${s}</option>`).join("");
}

function applyFilter(){

let fd = document.getElementById("fDate").value;
let fl = document.getElementById("fLigne").value;
let fs = document.getElementById("fShift").value;

let data = historyData.filter(d =>
(!fd || d.date == fd) &&
(!fl || d.ligne == fl) &&
(!fs || d.shift == fs)
);

let ul = document.getElementById("history");
ul.innerHTML = "";

data.forEach(d=>{
ul.innerHTML += `<li>${d.date} | ${d.ligne} | TRS ${d.trs.toFixed(2)}%</li>`;
});
}

function ranking(){

let map = {};

historyData.forEach(d=>{
if(!map[d.ligne]) map[d.ligne] = [];
map[d.ligne].push(d.trs);
});

let avg = Object.keys(map).map(l => ({
ligne: l,
avg: map[l].reduce((a,b)=>a+b)/map[l].length
}));

avg.sort((a,b)=>b.avg-a.avg);

let ul = document.getElementById("ranking");
ul.innerHTML = "";

avg.forEach(d=>{
ul.innerHTML += `<li>${d.ligne} - ${d.avg.toFixed(2)}%</li>`;
});
}

function exportCSV(){

if(historyData.length === 0){
alert("No data");
return;
}

let csv = "TRS Monitoring - Developed by SAAD DAMOU\n\n";
csv += "date,ligne,shift,trs,trg\n";

historyData.forEach(d=>{
csv += `${d.date},${d.ligne},${d.shift},${d.trs.toFixed(2)},${d.trg.toFixed(2)}\n`;
});

let blob = new Blob([csv], { type: "application/vnd.ms-excel" });

let link = document.createElement("a");
let url = URL.createObjectURL(blob);

link.href = url;
link.download = "TRS_Report.xls";

document.body.appendChild(link);
link.click();
document.body.removeChild(link);

}

function set(id,val){
document.getElementById(id).innerText = val.toFixed(2);
}

</script>

</body>
</html>
